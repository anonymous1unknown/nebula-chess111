global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'nebula-chess'

scrape_configs:
  - job_name: 'nebula_backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []
