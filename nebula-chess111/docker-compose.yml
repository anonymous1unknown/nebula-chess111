version: "3.9"

services:
  # ── Database ──────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: nebula_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-nebula}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nebula}
      POSTGRES_DB:       ${POSTGRES_DB:-nebula_chess}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nebula} -d ${POSTGRES_DB:-nebula_chess}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - nebula_net

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nebula_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - nebula_net

  # ── Backend ───────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nebula_backend
    restart: unless-stopped
    environment:
      DATABASE_URL:   postgresql+asyncpg://${POSTGRES_USER:-nebula}:${POSTGRES_PASSWORD:-nebula}@db:5432/${POSTGRES_DB:-nebula_chess}
      REDIS_URL:      redis://redis:6379/0
      SECRET_KEY:     ${SECRET_KEY:-change-me-please-use-a-long-random-string}
      ENVIRONMENT:    ${ENVIRONMENT:-production}
      STOCKFISH_PATH: /usr/games/stockfish
      CORS_ORIGINS:   '["http://localhost", "http://localhost:5173", "http://localhost:3000"]'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - nebula_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── DB migrations (one-shot) ──────────────────────────────────────────────────
  migrator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nebula_migrator
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nebula}:${POSTGRES_PASSWORD:-nebula}@db:5432/${POSTGRES_DB:-nebula_chess}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nebula_net
    restart: "no"

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nebula_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - nebula_net

  # ── Nginx reverse proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nebula_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - nebula_net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: nebula_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=15d'
    ports:
      - "9090:9090"
    networks:
      - nebula_net

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: nebula_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-nebula_admin}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_SERVER_ROOT_URL:         "http://localhost:3000"
      # FIX: Disables background plugin auto-update which fails with
      # "permission denied" because the built-in plugin dir inside the
      # image is read-only. Setting this to "false" stops Grafana from
      # attempting writes to that directory on startup.
      GF_PLUGINS_AUTO_UPDATE:     "false"
      # Prevent Grafana from trying to install/download any plugins at
      # boot time — eliminates the unlinkat permission denied error entirely.
      GF_INSTALL_PLUGINS:         ""
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - nebula_net

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  nebula_net:
    driver: bridge
